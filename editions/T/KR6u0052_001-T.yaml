body:
  text: 勅左丞相賈恍頒下諸州善之眾生每日念阿彌陀佛一千口斷惡行善今年大熱無人收苅有數眾病死第一虐病第二天行病死第三赤白痢病死第四赤眼病死第五人產病死第六水痢病死第七風病死今勸眾生寫此經免一門難寫本六親見此經不寫者滅門門上傍之得過此難無福者不可得見此經其經從南來正月八日雷電霹靂空中有一童子年四歲又見一老人在路中見一蛇身萬尺人頭鳥遂呼老人曰為太山崩要女人萬萬眾須得片萬萬願著病難差寫此經者得免此難不信者但看四月一日三家使一牛五男同一婦僧尼巡門難寫此經流傳聖人真言若袚𭂩風𪠴却不免難相勸阿彌陀佛不久見太平時
